    function doRipple(node,e){ const r=node.getBoundingClientRect(); const s=document.createElement('span'); const d=Math.max(r.width,r.height); s.style.cssText=`position:absolute;left:${e.clientX-r.left-d/2}px;top:${e.clientY-r.top-d/2}px;width:${d}px;height:${d}px;border-radius:50%;background:rgba(255,255,255,.35);pointer-events:none;animation:rip .5s ease-out forwards`; node.appendChild(s); setTimeout(()=>s.remove(),500); }
    function handle(act,arg){

        case 'go': go(arg,'nbin'); break;
        case 'tab': go(arg, arg==='home'?'nbback':'nbin'); break;
        case 'back': go(arg||'home','nbback'); break;
        case 'noop': case 'closeOv': closeOverlay(); break;

        case 'mmContact': { const pp=pets[+arg]; modal(`<div style="text-align:center;padding:6px 0 4px">${photo(64,pp.emoji,20)}<div style="font-size:16px;font-weight:800;margin-top:10px;color:${theme().txt}">${pp.n}</div><div style="font-size:11px;color:${theme().mut};font-weight:600">${pp.br} · ${pp.sx}</div></div>${[['pin','ตำแหน่งที่อยู่',pp.loc],['user','เจ้าของ',pp.owner],['phone','เบอร์ติดต่อ',pp.phone]].map(f=>`<div style="display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid ${theme().line}"><span style="width:34px;height:34px;border-radius:11px;background:${theme().soft};color:${GRN};display:flex;align-items:center;justify-content:center;flex:none">${ic(f[0],17)}</span><div><div style="font-size:10px;color:${theme().mut};font-weight:700">${f[1]}</div><div style="font-size:13px;font-weight:700;color:${theme().txt}">${f[2]}</div></div></div>`).join('')}<div style="margin-top:16px;display:flex;gap:9px"><button class="nbtap nbrip" data-action="callOwner" style="flex:1;border:none;background:${GRN};color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:13px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:7px">${ic('phone',17)}โทร</button><button class="nbtap nbrip" data-action="chatOpen" style="flex:1;border:none;background:${theme().soft};color:${GRN};font-family:inherit;font-size:14px;font-weight:800;padding:13px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:7px">${ic('chat',17)}แชท</button></div>`); break; }
        case 'mmPass': S.matchIdx++; render('nbfade'); break;
        case 'mmLike': { S.mmLikes.add(+arg); S.matchIdx++; const petName=pets[+arg].n; const breed=S.mmMode==='breed'; render('nbfade'); modal(`<div style="text-align:center;padding:10px 0"><div style="font-size:44px">${breed?'💞':'💚'}</div><div style="font-size:17px;font-weight:800;margin-top:6px">จับคู่สำเร็จ!</div><div style="font-size:12px;color:${theme().mut};margin-top:6px;max-width:250px;margin-left:auto;margin-right:auto">${P0().n} และ ${petName} ${breed?'มีความเข้ากันของสายพันธุ์สูง เหมาะสำหรับการผสมพันธุ์':'น่าจะเข้ากันได้ดี ลองทักทายกันดูสิ'}!</div><div style="margin-top:16px;display:flex;flex-direction:column;gap:9px">${cta('จัดกิจกรรมฉลองการจับคู่','go:celebration','star')}${cta('เยี่ยม','close')}</div></div>`); break; }
        case 'mmMatches': { const list=[...S.mmLikes].map(i=>pets[i]); modal(`<div style="font-size:16px;font-weight:800;margin-bottom:14px">รายการที่จับคู่แล้ว (${list.length})</div>${list.length?list.map(pp=>`<div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid ${theme().line}">${photo(40,pp.emoji,13)}<div style="flex:1"><div style="font-size:13px;font-weight:800;color:${theme().txt}">${pp.n}</div><div style="font-size:10px;color:${theme().mut};font-weight:600">${pp.br} · ${pp.sx}</div></div><span style="color:${GOLD}">${ic('heart',18)}</span></div>`).join(''):`<div style="font-size:12px;color:${theme().mut};padding:10px 0">ยังไม่มีคู่ที่จับคู่ไว้</div>`}<div style="margin-top:16px;display:flex;flex-direction:column;gap:9px">${list.length?cta('จัดกิจกรรมฉลองให้คู่ที่จับคู่แล้ว','go:celebration','star'):''}${cta('ปิด','close')}</div>`); break; }
        case 'celebPkg': S.celebPkg=+arg; render('nbfade'); break;
        case 'bookCeleb': modal(`<div style="text-align:center;padding:10px 0"><div style="font-size:44px">🎉</div><div style="font-size:17px;font-weight:800;margin-top:6px">จองการฉลองสำเร็จ!</div><div style="font-size:12px;color:${theme().mut};margin-top:6px;max-width:230px;margin-left:auto;margin-right:auto">${celebPackages[S.celebPkg].n} สำหรับ ${P0().n} — ทีมงานจะยืนยันวันให้เร็วๆ นี้</div><div style="margin-top:16px">${cta('เยี่ยม','close')}</div></div>`); break;
        case 'rerollFortune': S.fortuneRoll++; render('nbfade'); break;
        case 'claimMission': { const m=missionBank.find(x=>x.id===arg); if(m&&!S.fortuneMissions.has(arg)){ S.fortuneMissions.add(arg); S.fortunePoints+=m.pt; render('nbfade'); toast('ได้รับ '+m.pt+' แต้มโชค! 🍀','star'); } break; }
        case 'pawReading': { const p=P0(); const idx=(p.n.length+S.fortuneRoll)%pawReadings.length; modal(`<div style="text-align:center;padding:6px 0"><div style="font-size:44px">🐾</div><div style="font-size:17px;font-weight:800;margin-top:8px;color:${theme().txt}">ลายอุ้งเท้าของ ${p.n}</div><div style="font-size:12px;color:${theme().mut};margin-top:10px;line-height:1.6;max-width:250px;margin-left:auto;margin-right:auto">${pawReadings[idx]}</div><div style="margin-top:18px">${cta('ปิด','close')}</div></div>`); break; }
        case 'faceReading': { const p=P0(); const idx=(p.n.length*3+S.fortuneRoll)%faceReadings.length; modal(`<div style="text-align:center;padding:6px 0"><div style="font-size:44px">${p.emoji}</div><div style="font-size:17px;font-weight:800;margin-top:8px;color:${theme().txt}">โหงวเฮ้งของ ${p.n}</div><div style="font-size:12px;color:${theme().mut};margin-top:10px;line-height:1.6;max-width:250px;margin-left:auto;margin-right:auto">${faceReadings[idx]}</div><div style="margin-top:18px">${cta('ปิด','close')}</div></div>`); break; }
        case 'luckyNameGen': { const p=P0(); const idx=(p.n.length*5+S.fortuneRoll)%luckyNames.length; modal(`<div style="text-align:center;padding:6px 0"><div style="font-size:44px">✨</div><div style="font-size:17px;font-weight:800;margin-top:8px;color:${theme().txt}">ชื่อเสริมมงคลสำหรับ ${p.n}</div><div style="font-size:22px;font-weight:900;color:${GOLD};margin-top:12px">${luckyNames[idx]}</div><div style="font-size:12px;color:${theme().mut};margin-top:8px;line-height:1.6;max-width:250px;margin-left:auto;margin-right:auto">ลองเรียกชื่อนี้ควบคู่กับชื่อเดิม เชื่อว่าจะช่วยเสริมดวงและโชคลาภให้กับ ${p.n}</div><div style="margin-top:18px;display:flex;flex-direction:column;gap:9px">${cta('สุ่มชื่อใหม่','rerollFortune','star')}${cta('ปิด','close')}</div></div>`); break; }
        case 'tarotReading': { const idx=Math.floor(Math.random()*tarotBank.length); const t=tarotBank[idx]; modal(`<div style="text-align:center;padding:6px 0"><div style="font-size:52px">${t.emoji}</div><div style="font-size:17px;font-weight:800;margin-top:8px;color:${theme().txt}">${t.n}</div><div style="font-size:12px;color:${theme().mut};margin-top:10px;line-height:1.6;max-width:250px;margin-left:auto;margin-right:auto">${t.d}</div><div style="margin-top:18px;display:flex;flex-direction:column;gap:9px">${cta('เปิดไพ่อีกใบ','tarotReading','star')}${cta('ปิด','close')}</div></div>`); break; }
        case 'luckyColor': { const p=P0(); const idx=(p.n.length*2+S.fortuneRoll)%luckyColorBank.length; const lc=luckyColorBank[idx]; modal(`<div style="text-align:center;padding:6px 0"><div style="width:70px;height:70px;border-radius:50%;background:${lc.hex};margin:0 auto;box-shadow:0 10px 22px -10px rgba(0,0,0,.4)"></div><div style="font-size:17px;font-weight:800;margin-top:12px;color:${theme().txt}">สีมงคลของ ${p.n}: ${lc.c}</div><div style="font-size:12px;color:${theme().mut};margin-top:8px;line-height:1.6;max-width:250px;margin-left:auto;margin-right:auto">${lc.d}</div><div style="margin-top:18px">${cta('ปิด','close')}</div></div>`); break; }
        case 'funeralDetail': { const t=funeralProviders[+arg]; modal(funeralDetailHtml(+arg)); break; }
        case 'funeralPkg': { const [ti,ki]=arg.split(','); document.querySelectorAll(`[data-fpkg]`).forEach(el=>{const on=el.getAttribute('data-fpkg')===ki; el.style.outline=on?'2px solid '+GOLD:'none';}); S._funeralPkgSel=+ki; break; }
        case 'funeralSlotDay': { const [ti,di]=arg.split(','); S.funeralSlotDay=+di; document.querySelectorAll('[data-fday]').forEach((el,i)=>{el.style.background=i==di?GRN:theme().soft;el.style.color=i==di?'#fff':theme().txt;}); break; }
        case 'funeralSlotTime': { const [ti,tmi]=arg.split(','); S.funeralSlotTime=+tmi; document.querySelectorAll('[data-ftime]').forEach((el,i)=>{el.style.background=i==tmi?GRN:theme().soft;el.style.color=i==tmi?'#fff':theme().txt;}); break; }
        case 'funeralCall': { const t=funeralProviders[+arg]; toast('กำลังโทรหา '+t.n+'…','phone'); break; }
        case 'bookFuneral': { const ti=+arg; const t=funeralProviders[ti]; const k=funeralPackages[S._funeralPkgSel??0]; const days=['จ. 20','อ. 21','พ. 22','พฤ. 23']; const times=['09:00','13:00','16:00']; closeModal(); modal(`<div style="text-align:center;padding:10px 0"><div style="font-size:44px">🕊️</div><div style="font-size:17px;font-weight:800;margin-top:6px">จองคิวสำเร็จ</div><div style="font-size:12px;color:${theme().mut};margin-top:6px;max-width:250px;margin-left:auto;margin-right:auto">${k.n} ที่ ${t.n}<br>วัน${days[S.funeralSlotDay]} เวลา ${times[S.funeralSlotTime]}<br>ทีมงานจะติดต่อกลับที่เบอร์ ${t.tel}</div><div style="margin-top:16px">${cta('ปิด','close')}</div></div>`); break; }
        case 'close': closeModal(); break;
        default: break;
      }
    }
    app.addEventListener('click',e=>{ const r=e.target.closest('.nbrip'); if(r)doRipple(r,e); const a=e.target.closest('[data-action]'); if(!a)return; const raw=a.getAttribute('data-action'); const i=raw.indexOf(':'); handle(i<0?raw:raw.slice(0,i), i<0?undefined:raw.slice(i+1)); });
    [modalEl,ovEl].forEach(root=>root.addEventListener('click',e=>{ if(e.target.closest('[data-mclose]')){closeModal();return;} const r=e.target.closest('.nbrip'); if(r)doRipple(r,e); const a=e.target.closest('[data-action]'); if(!a)return; const raw=a.getAttribute('data-action'); const i=raw.indexOf(':'); handle(i<0?raw:raw.slice(0,i), i<0?undefined:raw.slice(i+1)); }));
    tabbarEl.addEventListener('click',e=>{ const a=e.target.closest('[data-action]'); if(!a)return; const raw=a.getAttribute('data-action'); const i=raw.indexOf(':'); handle('tab', raw.slice(i+1)); });

    // ---------- BOOT ----------
    this._screens=screens; this._ctx={theme,ic,cta,head,chipRow,photo,shadow,records,reminders,hospitals,adoption,vets,pets,S,GRN,FOR,GOLD,CORAL,recRow,adoGridHtml};
    render('nbfade');
  }
  renderVals(){ return {}; }
}
</script>
</body>
</html>
